[tool.ruff]

target-version = "py313"
line-length = 88

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist"
]

[tool.ruff.lint]

select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
    "UP",  # pyupgrade
    "B",   # bugbear
    "SIM", # simplify
]

ignore = [
    "E501"
]

[tool.ruff.format]

quote-style = "double"
indent-style = "space"
line-ending = "auto"